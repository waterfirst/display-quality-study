<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display Quality Study Guide 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f14;--surface:#1a1a24;--surface2:#24243a;--text:#e4e4e7;--text2:#a1a1aa;--ac:#10b981;--accent2:#059669;--border:#2a2a3a;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,.3)}
[data-theme="light"]{--bg:#f5f5f7;--surface:#ffffff;--surface2:#f0f0f2;--text:#18181b;--text2:#52525b;--ac:#059669;--accent2:#047857;--border:#e4e4e7;--shadow:0 2px 12px rgba(0,0,0,.08)}
body{font-family:'Noto Sans KR','Inter',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;min-height:100vh}
/* Splash */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s;overflow:hidden}
#splash.hide{opacity:0;pointer-events:none}
#splash h1{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:700;color:var(--ac);margin-bottom:.5rem;text-align:center;padding:0 1rem;position:relative;z-index:2}
#splash p{color:var(--text2);font-size:.95rem;position:relative;z-index:2}
#splash .bar{width:120px;height:3px;background:var(--border);border-radius:2px;margin-top:1.5rem;overflow:hidden;position:relative;z-index:2}
#splash .bar span{display:block;height:100%;width:0;background:var(--ac);border-radius:2px;animation:load 1.2s ease forwards}
@keyframes load{to{width:100%}}
/* Water drop icon */
.drop-icon{width:80px;height:80px;margin-bottom:1.5rem;position:relative;z-index:2}
.drop-icon svg{width:100%;height:100%;filter:drop-shadow(0 4px 20px rgba(16,185,129,.4));animation:dropBounce 1.2s ease-in-out}
@keyframes dropBounce{0%{transform:translateY(-60px) scale(.7);opacity:0}50%{transform:translateY(8px) scale(1.05);opacity:1}70%{transform:translateY(-4px) scale(.98)}100%{transform:translateY(0) scale(1)}}
/* Ripple rings */
.ripple-container{position:absolute;bottom:38%;left:50%;transform:translateX(-50%);z-index:1}
.ripple{position:absolute;border:2px solid var(--ac);border-radius:50%;opacity:0;transform:translate(-50%,-50%)}
.ripple:nth-child(1){animation:rippleOut 1.4s .5s ease-out forwards}
.ripple:nth-child(2){animation:rippleOut 1.4s .7s ease-out forwards}
.ripple:nth-child(3){animation:rippleOut 1.4s .9s ease-out forwards}
@keyframes rippleOut{0%{width:10px;height:5px;opacity:.6}100%{width:220px;height:40px;opacity:0}}
/* Floating mini drops */
.mini-drops{position:absolute;inset:0;z-index:0;pointer-events:none}
.mini-drop{position:absolute;width:8px;height:11px;background:radial-gradient(ellipse at 35% 25%,rgba(16,185,129,.5),rgba(16,185,129,.15));border-radius:50% 50% 50% 50%/60% 60% 40% 40%;opacity:0;animation:floatUp var(--dur) var(--delay) ease-in-out forwards}
@keyframes floatUp{0%{opacity:0;transform:translateY(40px) scale(.5)}30%{opacity:.7}100%{opacity:0;transform:translateY(-80px) scale(.3)}}
/* Header */
header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem}
.logo{font-weight:700;font-size:1.05rem;color:var(--ac);white-space:nowrap}
.header-actions{display:flex;align-items:center;gap:.75rem}
.theme-btn,.tts-global-btn{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:1rem;transition:border-color .2s}
.theme-btn:hover,.tts-global-btn:hover{border-color:var(--ac)}
.tts-global-btn.muted{opacity:.5}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}
/* Nav */
nav{background:var(--surface);border-bottom:1px solid var(--border)}
.nav-inner{max-width:960px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;color:var(--text2);padding:.7rem 1rem;font-size:.82rem;font-family:inherit;white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.nav-btn.active{color:var(--ac);border-bottom-color:var(--ac)}
.nav-btn:hover{color:var(--text)}
/* Main */
main{max-width:960px;margin:0 auto;padding:1.25rem}
.tab{display:none}
.tab.active{display:block}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:.85rem 1rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:.92rem;user-select:none;transition:background .15s;gap:.5rem}
.card-header:hover{background:var(--surface2)}
.card-header .arrow{transition:transform .2s;color:var(--text2);font-size:.75rem;flex-shrink:0}
.card.open .arrow{transform:rotate(90deg)}
.card-header .header-left{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0}
.card-body{padding:0 1rem;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s}
.card.open .card-body{padding:.25rem 1rem 1rem;max-height:8000px}
.card-body p,.card-body li{font-size:.88rem;line-height:1.7;color:var(--text2)}
.card-body strong{color:var(--text)}
.card-body ul{padding-left:1.2rem;margin:.4rem 0}
/* TTS button */
.tts-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:.85rem;cursor:pointer;transition:border-color .2s,background .2s;flex-shrink:0;line-height:1}
.tts-btn:hover{border-color:var(--ac);background:var(--surface2)}
.tts-btn.speaking{border-color:var(--ac);background:rgba(16,185,129,.15)}
/* Study links */
.study-links{margin:.6rem 0 .4rem;padding:0;list-style:none}
.study-link{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12.5px}
.study-link a{color:var(--ac);text-decoration:none;transition:color .15s}
.study-link a:hover{text-decoration:underline}
.study-link .link-desc{color:var(--text2);font-size:11.5px;margin-left:2px}
.subsection-title{font-size:.85rem;font-weight:600;color:var(--ac);margin:1rem 0 .4rem;padding-top:.5rem;border-top:1px solid var(--border)}
.subsection-title:first-child{border-top:none;padding-top:0;margin-top:.5rem}
/* Tables */
.tbl-wrap{overflow-x:auto;margin:.6rem 0}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--ac);color:#fff;padding:.55rem .6rem;text-align:left;font-weight:600;white-space:nowrap}
td{padding:.5rem .6rem;border-bottom:1px solid var(--border);color:var(--text2);white-space:nowrap}
tr:hover td{background:var(--surface2)}
/* Roadmap */
.phase{position:relative;padding-left:2rem;margin-bottom:1.5rem}
.phase::before{content:'';position:absolute;left:.55rem;top:0;bottom:0;width:2px;background:var(--border)}
.phase-dot{width:14px;height:14px;border-radius:50%;background:var(--ac);position:absolute;left:0;top:.15rem;border:2px solid var(--bg)}
.phase-title{font-weight:700;font-size:.95rem;color:var(--ac);margin-bottom:.4rem}
.phase-period{font-size:.78rem;color:var(--text2);margin-bottom:.35rem}
.phase-items{list-style:none;padding:0}
.phase-items li{font-size:.86rem;color:var(--text2);padding:.15rem 0;padding-left:.5rem;position:relative}
.phase-items li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--text2);position:absolute;left:-.6rem;top:.55rem}
/* Checklist */
.check-group{margin-bottom:1.2rem}
.check-group h3{font-size:.9rem;font-weight:600;color:var(--ac);margin-bottom:.5rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
.check-item{display:flex;align-items:center;gap:.6rem;padding:.4rem 0;font-size:.86rem;color:var(--text2)}
.check-item input[type=checkbox]{accent-color:var(--ac);width:16px;height:16px;cursor:pointer}
.check-item.done{text-decoration:line-through;opacity:.55}
/* Progress */
.progress-bar{background:var(--border);border-radius:6px;height:10px;margin:.6rem 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--accent2));border-radius:6px;transition:width .4s}
.progress-text{font-size:.84rem;color:var(--text2);text-align:center;font-weight:500;margin-bottom:.8rem}
/* Section title */
.sec-title{font-size:1.1rem;font-weight:700;margin-bottom:.8rem;color:var(--text);display:flex;align-items:center;gap:.5rem}
.sec-title span{font-size:1.2rem}
/* Reference links */
.ref-group{margin-bottom:1.2rem}
.ref-group h3{font-size:.9rem;font-weight:600;color:var(--ac);margin-bottom:.5rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
.ref-group .study-link{padding:3px 0}
/* Mobile */
@media(max-width:700px){
  .hamburger{display:block}
  nav{display:none}
  nav.open{display:block}
  .nav-inner{flex-direction:column}
  .nav-btn{text-align:left;padding:.8rem 1.25rem;border-bottom:none;border-left:3px solid transparent}
  .nav-btn.active{border-left-color:var(--ac);border-bottom-color:transparent}
  .study-link{font-size:12px}
}
</style>
</head>
<body>
<!-- Splash -->
<div id="splash">
  <div class="mini-drops" id="miniDrops"></div>
  <div class="drop-icon">
    <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="dropGrad" cx="40%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#6ee7b7"/>
          <stop offset="50%" stop-color="#10b981"/>
          <stop offset="100%" stop-color="#047857"/>
        </radialGradient>
        <radialGradient id="shineGrad" cx="35%" cy="30%" r="30%">
          <stop offset="0%" stop-color="rgba(255,255,255,.6)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>
      <path d="M50 8 C50 8, 15 55, 15 75 C15 97, 30 112, 50 112 C70 112, 85 97, 85 75 C85 55, 50 8, 50 8Z" fill="url(#dropGrad)" stroke="none"/>
      <ellipse cx="40" cy="60" rx="14" ry="18" fill="url(#shineGrad)" transform="rotate(-15,40,60)"/>
    </svg>
  </div>
  <div class="ripple-container">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
  </div>
  <h1>Display Quality Study Guide 2026</h1>
  <p>TFT 소자 품질 전문가 학습 가이드</p>
  <div class="bar"><span></span></div>
</div>

<header>
  <div class="header-inner">
    <div class="logo">DQ Study 2026</div>
    <div class="header-actions">
      <button class="tts-global-btn" id="ttsToggle" title="TTS 음소거 전환">🔊</button>
      <button class="theme-btn" id="themeBtn" title="테마 전환">🌙</button>
      <button class="hamburger" id="menuBtn">☰</button>
    </div>
  </div>
</header>

<nav id="navBar">
  <div class="nav-inner" id="navInner"></div>
</nav>

<main id="mainContent"></main>

<script>
// TTS Engine
let ttsMuted = false;
function speak(text) {
  if (ttsMuted) return;
  if (speechSynthesis.speaking) { speechSynthesis.cancel(); document.querySelectorAll('.tts-btn.speaking').forEach(b=>b.classList.remove('speaking')); return; }
  const clean = text.replace(/[🔊📺📖📄🎓🌐▶]/g,'').replace(/https?:\/\/\S+/g,'').trim();
  if (!clean) return;
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = 'ko-KR'; u.rate = 0.9;
  u.onend = () => { document.querySelectorAll('.tts-btn.speaking').forEach(b=>b.classList.remove('speaking')); };
  u.onerror = () => { document.querySelectorAll('.tts-btn.speaking').forEach(b=>b.classList.remove('speaking')); };
  speechSynthesis.speak(u);
}
function handleTTS(btn) {
  if (speechSynthesis.speaking) { speechSynthesis.cancel(); btn.classList.remove('speaking'); return; }
  btn.classList.add('speaking');
  const body = btn.closest('.card-header').nextElementSibling;
  speak(body.innerText);
}
document.getElementById('ttsToggle').addEventListener('click', function(){
  ttsMuted = !ttsMuted;
  this.textContent = ttsMuted ? '🔇' : '🔊';
  this.classList.toggle('muted', ttsMuted);
  if (ttsMuted && speechSynthesis.speaking) { speechSynthesis.cancel(); document.querySelectorAll('.tts-btn.speaking').forEach(b=>b.classList.remove('speaking')); }
});

// Helper: study link
function slink(icon, url, title, desc) {
  const d = desc ? `<span class="link-desc">— ${desc}</span>` : '';
  return `<div class="study-link">${icon} <a href="${url}" target="_blank" rel="noopener">${title}</a>${d}</div>`;
}

const TABS=[
{id:'roadmap',icon:'📋',label:'학습 로드맵'},
{id:'tft',icon:'🔬',label:'TFT 소자 기초'},
{id:'measure',icon:'⚡',label:'측정/분석법'},
{id:'defect',icon:'🔴',label:'불량 모드'},
{id:'tools',icon:'📊',label:'품질 도구'},
{id:'auto',icon:'🚗',label:'Automotive 품질'},
{id:'yield',icon:'🏭',label:'수율 관리'},
{id:'career',icon:'🔄',label:'산업 횡단 커리어'},
{id:'ref',icon:'📚',label:'참고 자료'},
{id:'check',icon:'✅',label:'학습 체크리스트'}
];

function card(title,body){return `<div class="card"><div class="card-header" onclick="this.parentElement.classList.toggle('open')"><div class="header-left">${title}<button class="tts-btn" onclick="event.stopPropagation();handleTTS(this)">🔊</button></div><span class="arrow">▶</span></div><div class="card-body">${body}</div></div>`}

const CONTENT={
roadmap:`<div class="sec-title"><span>📋</span> 학습 로드맵</div>
<div class="phase"><div class="phase-dot"></div><div class="phase-title">Phase 1: 기초 (1~2주)</div><div class="phase-period">TFT 소자 물리 및 OLED 구조 이해</div><ul class="phase-items"><li>TFT 소자 물리 기초 (MOSFET → TFT)</li><li>LTPS vs IGZO vs LTPO 비교</li><li>OLED 소자 구조 (HIL/HTL/EML/ETL/Cathode)</li><li>디스플레이 구동 원리 (2T1C, LTPO)</li></ul></div>
<div class="phase"><div class="phase-dot"></div><div class="phase-title">Phase 2: 측정/분석 (2~4주)</div><div class="phase-period">핵심 측정 역량 확보</div><ul class="phase-items"><li>I-V 특성 측정 (Id-Vg, Id-Vd)</li><li>VT (문턱전압) 측정법</li><li>Mobility 추출 방법</li><li>SS (Subthreshold Swing) 분석</li><li>NBTI/PBTI 스트레스 테스트</li><li>DC/AC 실구동 신뢰성 평가</li></ul></div>
<div class="phase"><div class="phase-dot"></div><div class="phase-title">Phase 3: 불량/신뢰성 (4~8주)</div><div class="phase-period">불량 모드 분석 및 신뢰성 평가</div><ul class="phase-items"><li>불량 모드 분류 (Mura, Pixel, Line, Stain)</li><li>Root Cause Analysis 방법론</li><li>FMEA (Failure Mode & Effects Analysis)</li><li>신뢰성 가속시험 (HTOL, TC, HTS, UHAST)</li><li>Automotive 품질 기준 (AEC-Q 시리즈)</li></ul></div>
<div class="phase"><div class="phase-dot"></div><div class="phase-title">Phase 4: 품질 시스템 (8~12주)</div><div class="phase-period">품질 관리 체계 및 방법론 내재화</div><ul class="phase-items"><li>SPC (Statistical Process Control)</li><li>6시그마 DMAIC</li><li>8D Report 작성법</li><li>MSA (측정 시스템 분석)</li><li>DOE (실험계획법)</li><li>Gate Review 프로세스</li><li>수율 관리 (Yield Waterfall, OEE)</li><li>품질 비용 (Cost of Quality)</li></ul></div>
<div class="phase"><div class="phase-dot"></div><div class="phase-title">Phase 5: 커리어 확장 (12주~)</div><div class="phase-period">산업 횡단 역량 강화 및 자격 취득</div><ul class="phase-items"><li>ASQ CQE / 6시그마 벨트 자격 준비</li><li>타 산업 QMS 표준 학습 (IATF, AS9100, ISO 13485)</li><li>Python + SQL 데이터 분석 역량</li><li>AI/ML 기반 예측 품질 (Predictive Quality)</li><li>영문 이력서/포트폴리오 구축</li></ul></div>`,

tft:`<div class="sec-title"><span>🔬</span> TFT 소자 기초</div>
${card('MOSFET → TFT 원리',`<ul><li><strong>Gate, Source, Drain 구조:</strong> Gate 전압으로 채널 전류를 제어하는 3단자 소자</li><li><strong>채널 형성:</strong> Accumulation → Depletion → Inversion 과정으로 전도 채널 생성</li><li><strong>문턱전압 (VT):</strong> 채널이 형성되기 시작하는 Gate 전압. 소자 동작의 기준점</li><li>TFT는 MOSFET과 달리 유리/PI 기판 위 박막(Thin Film)으로 제작</li></ul>
<div class="subsection-title">MOSFET 학습 자료</div>
<div class="study-links">
${slink('📺','https://www.youtube.com/watch?v=AwRJsze_9m4','MOSFET 동작 원리 (YouTube)','24분, 영어 (자막)')}
${slink('📺','https://www.youtube.com/playlist?list=PLmfHzApbF5dYnZTqPDsJj31mOQtD7vDT2','반도체 소자 물리 전체 강의 (YouTube)','VLSI용 소자 물리')}
${slink('📖','https://nanohub.org/courses/mos','nanoHUB: Essentials of MOSFETs','Purdue 무료 온라인 코스')}
${slink('📄','https://www.montana.edu/aolson/eele414/lecture_notes/eele414_module_02_MOSFETs.pdf','MOSFET 구조와 동작 강의노트 (PDF)','Montana State Univ.')}
</div>`)}
${card('TFT 종류 비교',`<div class="tbl-wrap"><table><tr><th>항목</th><th>a-Si</th><th>LTPS</th><th>IGZO</th><th>LTPO</th></tr>
<tr><td><strong>이동도</strong></td><td>0.5~1</td><td>50~100</td><td>10~30</td><td>LTPS+IGZO</td></tr>
<tr><td><strong>균일성</strong></td><td>좋음</td><td>보통</td><td>매우 좋음</td><td>좋음</td></tr>
<tr><td><strong>누설전류</strong></td><td>높음</td><td>높음</td><td>매우 낮음</td><td>낮음</td></tr>
<tr><td><strong>용도</strong></td><td>LCD(구형)</td><td>OLED 모바일</td><td>OLED TV/태블릿</td><td>OLED 모바일(최신)</td></tr>
<tr><td><strong>VT 안정성</strong></td><td>나쁨</td><td>보통</td><td>좋음(PBTI 주의)</td><td>좋음</td></tr></table></div>
<div class="subsection-title">IGZO TFT 학습 자료</div>
<div class="study-links">
${slink('📖','https://namu.wiki/w/Oxide%20TFT','Oxide TFT 나무위키 (한국어)','기초 개념 정리')}
${slink('📄','https://www.ceramist.or.kr/upload/pdf/ceramist-2014-17-1-26.pdf','OLED용 산화물 TFT 논문 (한국어 PDF)','세라미스트 학회지')}
${slink('📖','https://www.amorphyx.com/igzo-ametft','IGZO TFT 종합 가이드 (Amorphyx)','기술 개요 + 응용')}
${slink('📖','https://ettrends.etri.re.kr/ettrends/137/0905001762/27-5_109-125.pdf','디스플레이용 TFT 기술 이노베이션 (ETRI, 한국어 PDF)','ETRI 기술 트렌드')}
${slink('📖','https://news.skhynix.co.kr/display-development/','SK하이닉스 — 디스플레이 발전 속 TFT 반도체','한국어 해설')}
</div>`)}
${card('LTPO (Low-Temperature Polycrystalline Oxide)',`<ul><li><strong>LTPS (driving TFT) + IGZO (switching TFT)</strong> 하이브리드 구조</li><li>IGZO의 극저 누설전류로 <strong>가변 주사율 (1Hz~120Hz)</strong> 구현 → 저전력</li><li>Apple Watch Series 5부터 적용, Galaxy S21 Ultra 이후 확대</li><li>Always-On Display 구현의 핵심 기술</li></ul>
<div class="subsection-title">LTPO 학습 자료</div>
<div class="study-links">
${slink('📖','https://en.wikipedia.org/wiki/Low-temperature_polycrystalline_silicon','LTPS 위키피디아','영문 개요')}
${slink('📄','https://sid.onlinelibrary.wiley.com/doi/10.1002/sdtp.13874','High Quality IGZO-TFT 논문 (SID)','SID Journal')}
</div>`)}
${card('핵심 파라미터 정리',`<ul><li><strong>VT (Threshold Voltage):</strong> 채널 형성 시작점. OLED 균일도에 직결</li><li><strong>μ (Mobility):</strong> 전자/정공 이동 속도. 구동 전류 결정</li><li><strong>SS (Subthreshold Swing):</strong> on/off 전환 기울기. 이상적: 60mV/dec (RT)</li><li><strong>Ion/Ioff:</strong> on/off 전류비. 10⁶ 이상 필요</li><li><strong>DIBL:</strong> Drain-Induced Barrier Lowering. 단채널 효과 지표</li></ul>`)}
${card('TFT 신뢰성 (NBTI/PBTI)',`<ul><li><strong>NBTI (Negative Bias Temperature Instability):</strong> 음의 게이트 바이어스 + 온도 → VT 열화</li><li><strong>PBTI (Positive Bias Temperature Instability):</strong> 양의 게이트 바이어스 → IGZO에서 특히 중요</li><li><strong>메커니즘:</strong> 계면 트랩 생성 + 산화물 전하 축적</li><li>IGZO TFT에서는 PBTI가 지배적 열화 모드</li></ul>

<div class="study-links">

${slink('📄','https://www.researchgate.net/publication/359125937','IGZO TFT PBTI 모델링 (ResearchGate)','연구 논문')}

measure:`<div class="sec-title"><span>⚡</span> 측정/분석법</div>
${card('I-V 측정',`<ul><li><strong>Id-Vg (Transfer Curve):</strong> VT, SS, Ion/Ioff, μ 추출 가능. 가장 핵심적인 특성 곡선</li><li><strong>Id-Vd (Output Curve):</strong> 선형 영역 (Vd < Vg-VT) / 포화 영역 (Vd > Vg-VT) 확인</li><li><strong>Hysteresis:</strong> 정방향/역방향 스윕 차이 → 계면 트랩 밀도 (Dit) 지표</li></ul>

</div>`)}
${card('VT 추출법',`<ul><li><strong>Linear Extrapolation Method:</strong> √Id vs Vg 그래프에서 최대 기울기 접선의 x절편</li><li><strong>Constant Current Method:</strong> Id = W/L × 10nA 지점의 Vg 값</li><li><strong>Second Derivative Method:</strong> d²Id/dVg² 최대값에 해당하는 Vg</li></ul>`)}
${card('신뢰성 스트레스 테스트',`<ul><li><strong>PBTS</strong> (Positive Bias Temperature Stress): VG=+20V, 60°C, 3600s</li><li><strong>NBTS</strong> (Negative Bias Temperature Stress): VG=-20V, 60°C, 3600s</li><li><strong>NBTIS</strong> (+ Illumination): 빛 조사 하 음바이어스 스트레스. IGZO에 특히 중요</li><li><strong>HCI</strong> (Hot Carrier Injection): 고전계 하 캐리어 주입 손상</li><li><strong>평가 기준:</strong> ΔVT < 1V (일반), ΔVT < 0.5V (automotive)</li></ul>`)}
${card('Mueller Matrix / 편광 분석',`<ul><li><strong>위상차 (Retardance)</strong> 측정: 광학 필름 및 보상 필름 평가</li><li><strong>편광축 (Slow Axis)</strong> 분석: 편광 방향 정밀 측정</li><li><strong>복굴절 (Birefringence)</strong> 맵핑: 공간적 균일성 확인</li><li><strong>장비:</strong> AxoScan/AxoStep (Axometrics) 활용</li></ul>
<div class="subsection-title">Mueller Matrix 자료</div>
<div class="study-links">

</div>`)}`,

${card('화소 불량',`<ul><li><strong>Dead Pixel (암점):</strong> TFT open 또는 OLED short → 해당 화소 발광 불가</li><li><strong>Bright Pixel (휘점):</strong> TFT short 또는 leakage → 항상 발광 상태</li><li><strong>Stuck Pixel:</strong> 특정 색(R/G/B)에 고정 → 구동 IC 또는 데이터 라인 이상</li></ul>`)}
${card('Mura (얼룩)',`<ul><li><strong>Spot Mura:</strong> 국부적 밝기 불균일 → TFT VT 산포, OLED 두께 편차</li><li><strong>Line Mura:</strong> 라인 형태 밝기 차이 → 소스 드라이버 출력 편차</li><li><strong>Cloud Mura:</strong> 넓은 영역 얼룩 → 공정 산포 (LTPS 결정화 등)</li><li><strong>Stain:</strong> 이물/오염 → 클린룸 관리 이슈</li><li><strong>핵심 원인:</strong> TFT 균일성, OLED 증착 두께 산포, 봉지(Encap) 불량</li></ul>

</div>`)}
${card('라인 불량',`<ul><li><strong>Gate Line Open/Short:</strong> Gate 신호 전달 불가 → 해당 라인 전체 불량</li><li><strong>Data Line Open/Short:</strong> 데이터 신호 전달 불가 → 세로 줄 불량</li><li><strong>주요 원인:</strong> 공정 중 파티클, 식각(Etch) 불량, 리프트오프 잔여물</li></ul>`)}

tools:`<div class="sec-title"><span>📊</span> 품질 도구</div>
${card('SPC (통계적 공정 관리)',`<ul><li><strong>X-bar R Chart:</strong> 평균 및 범위 관리 → 공정 안정성 모니터링</li><li><strong>p Chart:</strong> 불량률 관리 → 로트별 품질 추적</li><li><strong>Cp/Cpk (공정 능력 지수):</strong></li><li>Cp ≥ 1.33 (4σ 수준), Cp ≥ 1.67 (5σ), Cp ≥ 2.0 (6σ)</li><li>Cpk는 공정 치우침 반영 → 실질적 공정 능력 평가</li></ul>
<div class="subsection-title">SPC 학습 자료</div>
<div class="study-links">
${slink('📖','https://www.6sigma.us/six-sigma-in-focus/statistical-process-control-spc/','SPC 종합 가이드 (SixSigma.us)','개념 + 사례')}
${slink('🎓','https://www.coursera.org/learn/master-quality-management-apply-spc-six-sigma-lean','Coursera: SPC, Six Sigma & Lean','온라인 코스')}
</div>`)}
${card('6시그마 DMAIC',`<ul><li><strong>D (Define):</strong> 문제 정의, CTQ(Critical To Quality) 선정, 프로젝트 헌장</li><li><strong>M (Measure):</strong> 현 수준 측정, MSA(측정 시스템 분석), 데이터 수집 계획</li><li><strong>A (Analyze):</strong> 원인 분석, 가설 검증, 통계 분석 (ANOVA, 회귀 등)</li><li><strong>I (Improve):</strong> 최적 조건 도출, DOE(실험계획법), 개선안 검증</li><li><strong>C (Control):</strong> 관리 계획 수립, SPC 적용, 표준화</li></ul>
<div class="subsection-title">DMAIC 학습 자료</div>
<div class="study-links">
${slink('📖','https://asq.org/quality-resources/dmaic','ASQ — DMAIC Process','공식 가이드')}
${slink('📄','https://www.intechopen.com/chapters/64172','반도체 6시그마 수율 개선 사례 (IntechOpen)','실제 사례 연구')}
${slink('📖','https://www.sixsigmaonline.org/8d-vs-dmaic/','DMAIC vs 8D 비교','방법론 비교')}
</div>`)}
${card('FMEA (고장 모드 영향 분석)',`<ul><li><strong>DFMEA (설계):</strong> 설계 단계에서 잠재적 고장 모드 사전 분석</li><li><strong>PFMEA (공정):</strong> 공정 단계에서 잠재적 고장 모드 사전 분석</li><li><strong>RPN = Severity × Occurrence × Detection</strong></li><li>각 항목 1~10 점수, RPN > 100: 즉시 개선 필요</li><li>Severity ≥ 9: RPN 무관하게 반드시 대책 수립</li></ul>
<div class="subsection-title">FMEA 학습 자료</div>
<div class="study-links">

${slink('🎓','https://pe.gatech.edu/courses/introduction-quality-core-tools','Georgia Tech — Quality Core Tools','교육 과정')}
</div>`)}
${card('8D Report',`<ul><li><strong>D1:</strong> 팀 구성 (Cross-functional Team)</li><li><strong>D2:</strong> 문제 정의 (Is/Is Not 분석)</li><li><strong>D3:</strong> 긴급 대책 (Containment Action)</li><li><strong>D4:</strong> 근본 원인 분석 (5-Why, Fish-bone Diagram)</li><li><strong>D5:</strong> 영구 대책 수립 (Permanent Corrective Action)</li><li><strong>D6:</strong> 영구 대책 실행 및 유효성 검증</li><li><strong>D7:</strong> 재발 방지 (Preventive Action, 수평전개)</li><li><strong>D8:</strong> 종료 및 팀 공유 (Lessons Learned)</li></ul>
<div class="subsection-title">8D 학습 자료</div>
<div class="study-links">
${slink('📖','https://www.6sigma.us/six-sigma-in-focus/8d-corrective-action/','8D 문제해결법 (SixSigma.us)','단계별 해설')}
</div>`)}
${card('MSA (측정 시스템 분석)',`<ul><li><strong>Gage R&R (반복성 & 재현성):</strong> 측정 시스템의 변동이 전체 변동의 몇 %인지 평가</li><li>%R&R < 10%: 우수, 10~30%: 조건부 허용, > 30%: 불합격</li><li><strong>Bias:</strong> 측정값과 참값의 체계적 차이</li><li><strong>Linearity:</strong> 측정 범위에 걸친 Bias의 일관성</li><li><strong>Stability:</strong> 시간에 따른 측정 시스템의 변동</li><li><strong>Attribute Agreement:</strong> 합/불 판정의 일치도 (Kappa)</li></ul>

${card('DOE (실험계획법)',`<ul><li><strong>Full Factorial:</strong> 모든 인자 조합 실험. 인자 수 적을 때 (2~3개)</li><li><strong>Fractional Factorial:</strong> 일부 조합만 실험. 스크리닝 목적</li><li><strong>Response Surface (RSM):</strong> 최적 조건 탐색. 2차 모델</li><li><strong>Taguchi Method:</strong> 직교 배열 활용. 로버스트 설계</li><li><strong>핵심:</strong> Main Effect, Interaction, Confounding 이해</li></ul>

${card('Gate Review 프로세스',`<ul><li><strong>G0:</strong> 과제 기획 → 시장/기술 타당성 검토</li><li><strong>G1:</strong> 개발 착수 승인 → 요구 사양 확정</li><li><strong>G2:</strong> 설계 완료 → 설계 검증(DVT) 결과 확인</li><li><strong>G3:</strong> 시작품 검증 완료 → PVT 결과, 신뢰성 확인</li><li><strong>G4:</strong> 양산 이관 승인 → 양산 준비 상태 확인</li><li><strong>G5:</strong> 양산 안정화 확인 → 수율/품질 목표 달성</li></ul>`)}
${card('품질 비용 (Cost of Quality)',`<ul><li><strong>예방 비용 (Prevention):</strong> 교육, 공정 설계, FMEA → 비용 가장 낮음</li><li><strong>평가 비용 (Appraisal):</strong> 검사, 시험, 감사 → 불량 유출 방지</li><li><strong>내부 실패 비용 (Internal Failure):</strong> 재작업, 폐기, 수율 손실</li><li><strong>외부 실패 비용 (External Failure):</strong> 클레임, 리콜, 브랜드 손상 → 비용 가장 높음</li><li><strong>1:10:100 법칙:</strong> 예방 1원 = 검사 10원 = 사후 100원</li></ul>`)}`,

yield:`<div class="sec-title"><span>🏭</span> 수율 관리 (Yield Management)</div>
${card('Yield Waterfall',`<ul><li><strong>Total Yield = Y₁ × Y₂ × Y₃ × ... × Yn</strong> (각 공정 수율의 곱)</li><li><strong>Gross Yield:</strong> 전체 투입 대비 양품 비율</li><li><strong>Net Yield:</strong> 검사 통과 기준 적용 후 실질 양품률</li><li><strong>Waterfall Chart:</strong> 공정 단계별 수율 손실을 폭포수처럼 시각화</li><li>각 단계에서 어디서 가장 큰 Loss가 발생하는지 한눈에 파악</li></ul>
<div class="subsection-title">핵심 수율 공식</div>
<ul><li><strong>DPU</strong> (Defects Per Unit) = 총 결함 수 / 총 검사 단위</li><li><strong>DPMO</strong> (Defects Per Million Opportunities) = DPU / 기회 수 × 10⁶</li><li><strong>RTY</strong> (Rolled Throughput Yield) = ∏(1 - DPU_i) → 숨겨진 공장(Hidden Factory) 드러냄</li><li><strong>Poisson 근사:</strong> FTY ≈ e^(-DPU) (First Time Yield)</li></ul>`)}
${card('Loss 카테고리 분류',`<div class="tbl-wrap"><table><tr><th>카테고리</th><th>설명</th><th>예시</th></tr>
<tr><td><strong>Parametric Loss</strong></td><td>측정값이 스펙 벗어남</td><td>VT 산포, 두께 편차</td></tr>
<tr><td><strong>Defect Loss</strong></td><td>물리적 결함</td><td>Pixel, Mura, Line Open</td></tr>
<tr><td><strong>Reliability Loss</strong></td><td>시간 경과 후 불량</td><td>Burn-in, Dark Spot</td></tr>
<tr><td><strong>Process Loss</strong></td><td>공정 자체 문제</td><td>장비 미스, 레시피 오류</td></tr>
<tr><td><strong>Handling Loss</strong></td><td>취급 중 손상</td><td>스크래치, 깨짐, ESD</td></tr></table></div>`)}
${card('수율 분석 프레임워크',`<ul><li><strong>Pareto 분석:</strong> 상위 20% 불량 유형이 80% 손실 차지 → 집중 개선</li><li><strong>Defect Density Map:</strong> 기판/패널 위치별 결함 밀도 히트맵</li><li><strong>Trend Monitoring:</strong> 일/주/월 단위 수율 추이 → 이상 징후 조기 포착</li><li><strong>상관 분석:</strong> 공정 파라미터(온도, 압력 등) vs 수율 상관관계</li><li><strong>DOE (실험계획법):</strong> 최적 공정 조건 탐색 → 수율 극대화</li></ul>
<div class="subsection-title">수율 학습 자료</div>

</div>`)}
${card('OEE (설비 종합 효율)',`<ul><li><strong>OEE = 가동률 × 성능률 × 양품률</strong></li><li><strong>가동률 (Availability):</strong> 계획 가동 시간 중 실제 가동 비율</li><li><strong>성능률 (Performance):</strong> 이론 Cycle Time 대비 실제 생산 속도</li><li><strong>양품률 (Quality):</strong> 생산 수량 중 양품 비율</li><li>세계적 수준: OEE ≥ 85%</li><li><strong>6대 로스:</strong> 고장, 셋업/조정, 공회전/일시정지, 속도저하, 초기수율, 공정불량</li></ul>`)}`,

function getChecked(){try{return JSON.parse(localStorage.getItem('dq_check')||'{}');}catch(e){return {};}}
function saveChecked(obj){localStorage.setItem('dq_check',JSON.stringify(obj));}

function buildCheck(){
  const checked=getChecked();
  const total=CHECKLIST.reduce((s,g)=>s+g.items.length,0);
  const done=Object.values(checked).filter(Boolean).length;
  const pct=total?Math.round(done/total*100):0;
  let html=`<div class="sec-title"><span>✅</span> 학습 체크리스트</div>
  <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:${pct}%"></div></div>
  <div class="progress-text" id="progText">${done}/${total} 완료 (${pct}%)</div>`;
  CHECKLIST.forEach(g=>{
    html+=`<div class="check-group"><h3>${g.group}</h3>`;
    g.items.forEach(item=>{
      const key=g.group+'__'+item;
      const c=checked[key]?'checked':'';
      const cls=checked[key]?'check-item done':'check-item';
      html+=`<label class="${cls}"><input type="checkbox" ${c} data-key="${key}">${item}</label>`;
    });
    html+=`</div>`;
  });
  return html;
}

// Init
const navInner=document.getElementById('navInner');
const mainEl=document.getElementById('mainContent');

TABS.forEach((t,i)=>{
  const btn=document.createElement('button');
  btn.className='nav-btn'+(i===0?' active':'');
  btn.textContent=t.icon+' '+t.label;
  btn.dataset.tab=t.id;
  btn.addEventListener('click',()=>switchTab(t.id));
  navInner.appendChild(btn);

  const div=document.createElement('div');
  div.className='tab'+(i===0?' active':'');
  div.id='tab-'+t.id;
  div.innerHTML=t.id==='check'?buildCheck():CONTENT[t.id];
  mainEl.appendChild(div);
});

function switchTab(id){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.id==='tab-'+id));
  if(id==='check') document.getElementById('tab-check').innerHTML=buildCheck();
  bindCheckEvents();
  const nav=document.getElementById('navBar');
  if(nav.classList.contains('open')) nav.classList.remove('open');
}

function bindCheckEvents(){
  document.querySelectorAll('#tab-check input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change',e=>{
      const obj=getChecked();
      obj[e.target.dataset.key]=e.target.checked;
      saveChecked(obj);
      document.getElementById('tab-check').innerHTML=buildCheck();
      bindCheckEvents();
    });
  });
}
bindCheckEvents();

// Theme
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️';
  localStorage.setItem('dq_theme',t);
}
const saved=localStorage.getItem('dq_theme')||'dark';
setTheme(saved);
document.getElementById('themeBtn').addEventListener('click',()=>{
  setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
});

// Hamburger
document.getElementById('menuBtn').addEventListener('click',()=>{
  document.getElementById('navBar').classList.toggle('open');
});

// Splash mini drops
(function(){
  const c=document.getElementById('miniDrops');
  for(let i=0;i<12;i++){
    const d=document.createElement('div');
    d.className='mini-drop';
    d.style.left=Math.random()*90+5+'%';
    d.style.top=Math.random()*60+20+'%';
    d.style.setProperty('--delay',(.2+Math.random()*.8)+'s');
    d.style.setProperty('--dur',(1+Math.random()*.6)+'s');
    d.style.width=(5+Math.random()*6)+'px';
    d.style.height=(7+Math.random()*8)+'px';
    c.appendChild(d);
  }
})();
// Splash hide
setTimeout(()=>{document.getElementById('splash').classList.add('hide');setTimeout(()=>document.getElementById('splash').remove(),600)},1800);
